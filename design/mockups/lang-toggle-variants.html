<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Toggle — 3 Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=Krona+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --sangria: #541736;
      --pthalo: #1C4447;
      --platinum: #C4C4C4;
      --black: #000;
      --white: #FFF;
      --cream: #F3FFB9;
      --gl: #F8F9FA;
      --gm: #6C757D;
      --gd: #343A40;
      --g3: #DEE2E6;
      --fp: 'Krona One', sans-serif;
      --fs: 'Hanken Grotesk', sans-serif;
      --rmd: .375rem;
      --rlg: .5rem;
      --rfull: 9999px;
      --sh-sm: 0 1px 2px rgba(0,0,0,.05);
      --sh-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
      --dur: 200ms;
      --ease: cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: var(--fs); color: var(--black); background: #eee; -webkit-font-smoothing: antialiased; }
    button { font-family: var(--fs); cursor: pointer; border: none; background: none; }

    /* ─── Layout ─── */
    .page { display: flex; flex-direction: column; gap: 0; }

    .row-label {
      text-align: center;
      font-family: var(--fs);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gm);
      padding: 28px 0 12px;
    }

    /* ─── Nav strip ─── */
    .nav-strip {
      width: 100%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: relative;
    }
    .nav-strip.on-hero {
      background: linear-gradient(to right, #1a3a2a, #2d1a1a);
    }
    .nav-strip.on-white {
      background: rgba(255,255,255,0.96);
      box-shadow: 0 1px 0 rgba(0,0,0,.06);
    }

    .nav-logo {
      font-family: var(--fp);
      font-size: 17px;
      letter-spacing: -0.04em;
    }
    .nav-strip.on-hero  .nav-logo { color: var(--white); }
    .nav-strip.on-white .nav-logo { color: var(--sangria); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--fs);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: var(--rmd);
      min-height: 38px;
      letter-spacing: 0.01em;
      white-space: nowrap;
      transition: all var(--dur) var(--ease);
      cursor: pointer;
    }
    .nav-strip.on-hero  .back-btn { color: var(--white); border: 1.5px solid rgba(255,255,255,.35); background: transparent; }
    .nav-strip.on-hero  .back-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.55); }
    .nav-strip.on-white .back-btn { color: var(--sangria); border: 1.5px solid var(--sangria); background: transparent; }
    .nav-strip.on-white .back-btn:hover { background: var(--sangria); color: var(--white); transform: translateY(-1px); }

    /* Variant label badge */
    .v-badge {
      font-family: var(--fs);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: var(--rfull);
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
    .nav-strip.on-white .v-badge {
      background: var(--gl);
      color: var(--gm);
      border-color: var(--g3);
    }

    /* ─── Shared lang toggle base ─── */
    .lt { position: relative; }
    .lt-trigger {
      font-family: var(--fs);
      cursor: pointer;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }
    .lt-chevron {
      width: 11px; height: 11px;
      stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
      transition: transform var(--dur) var(--ease);
    }
    .lt.open .lt-chevron { transform: rotate(180deg); }
    .lt-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--white);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-5px) scale(0.98);
      transform-origin: top right;
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease), visibility var(--dur);
    }
    .lt.open .lt-panel { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
    .lt-check {
      fill: none; stroke: var(--sangria); stroke-width: 2.5;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; margin-left: auto;
      width: 13px; height: 13px;
    }

    /* ════════════════════════════════════════
       VARIANT 1 — Outlined Pill
       Trigger mirrors the Back button exactly
    ════════════════════════════════════════ */
    .lt.v1 .lt-trigger {
      gap: 6px; font-size: 13px; font-weight: 600;
      padding: 8px 14px; border-radius: var(--rmd);
      min-height: 38px; border: 1.5px solid;
      background: transparent; letter-spacing: 0.01em;
      transition: all var(--dur) var(--ease);
    }
    .on-hero  .lt.v1 .lt-trigger { color: var(--white); border-color: rgba(255,255,255,.35); }
    .on-hero  .lt.v1 .lt-trigger:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.55); }
    .on-white .lt.v1 .lt-trigger { color: var(--sangria); border-color: var(--sangria); }
    .on-white .lt.v1 .lt-trigger:hover { background: var(--sangria); color: var(--white); transform: translateY(-1px); }

    .lt.v1 .lt-flag { font-size: 15px; line-height: 1; }
    .lt.v1 .lt-sep  { width: 1px; height: 11px; background: currentColor; opacity: 0.25; }
    .lt.v1 .lt-code { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; }

    .lt.v1 .lt-panel {
      min-width: 168px; border-radius: var(--rlg);
      box-shadow: var(--sh-md), 0 0 0 1px rgba(0,0,0,.04); padding: 5px;
    }
    .lt.v1 .lt-option {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 8px 10px; border-radius: var(--rmd); border: none; background: none;
      font-family: var(--fs); color: var(--gd); cursor: pointer; text-align: left;
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
    }
    .lt.v1 .lt-option:hover       { background: var(--gl); color: var(--sangria); }
    .lt.v1 .lt-option.active      { color: var(--sangria); background: rgba(84,23,54,.05); }
    .lt.v1 .lt-opt-flag { font-size: 15px; line-height: 1; flex-shrink: 0; }
    .lt.v1 .lt-opt-code { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; min-width: 22px; }
    .lt.v1 .lt-opt-name { flex: 1; font-size: 12px; color: var(--gm); }
    .lt.v1 .lt-option.active .lt-opt-name { color: rgba(84,23,54,.5); }

    /* ════════════════════════════════════════
       VARIANT 2 — Globe Accent
       Ghost trigger; panel has header + left accent
    ════════════════════════════════════════ */
    .lt.v2 .lt-trigger {
      gap: 5px; font-size: 13px; font-weight: 500;
      padding: 7px 10px; border-radius: var(--rmd);
      min-height: 36px; border: 1px solid transparent;
      background: none; letter-spacing: 0.04em;
      transition: all var(--dur) var(--ease);
    }
    .on-hero  .lt.v2 .lt-trigger         { color: rgba(255,255,255,.7); }
    .on-hero  .lt.v2 .lt-trigger:hover   { color: var(--white); background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); }
    .on-white .lt.v2 .lt-trigger         { color: var(--gm); }
    .on-white .lt.v2 .lt-trigger:hover   { color: var(--sangria); background: rgba(84,23,54,.04); border-color: rgba(84,23,54,.15); }

    .lt.v2 .lt-globe { width: 15px; height: 15px; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .lt.v2 .lt-code  { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; }

    .lt.v2 .lt-panel {
      min-width: 210px; border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
      padding: 0; overflow: hidden;
    }
    .lt.v2 .lt-panel-header { display: flex; align-items: center; padding: 11px 16px 9px; border-bottom: 1px solid rgba(0,0,0,.06); }
    .lt.v2 .lt-panel-label  { font-family: var(--fs); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gm); }

    .lt.v2 .lt-option {
      display: flex; align-items: center; gap: 11px; width: 100%;
      padding: 11px 16px; border: none; border-left: 3px solid transparent;
      background: none; font-family: var(--fs); font-size: 13px;
      color: var(--gd); cursor: pointer; text-align: left;
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-left-color var(--dur) var(--ease);
    }
    .lt.v2 .lt-option:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,.045); }
    .lt.v2 .lt-option:hover  { background: var(--gl); color: var(--sangria); border-left-color: rgba(84,23,54,.3); }
    .lt.v2 .lt-option.active { color: var(--sangria); border-left-color: var(--sangria); background: rgba(84,23,54,.03); }
    .lt.v2 .lt-opt-flag { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .lt.v2 .lt-opt-code { display: none; }
    .lt.v2 .lt-opt-name { flex: 1; font-size: 13px; }
    .lt.v2 .lt-option.active .lt-opt-name { font-weight: 600; }

    /* ════════════════════════════════════════
       VARIANT 3 — Flag Forward
       Shows full name in trigger; tinted active rows
    ════════════════════════════════════════ */
    .lt.v3 .lt-trigger {
      gap: 7px; font-size: 13px; font-weight: 500;
      padding: 8px 14px; border-radius: var(--rmd);
      min-height: 38px; border: 1.5px solid;
      cursor: pointer; letter-spacing: 0.01em;
      transition: all var(--dur) var(--ease);
    }
    .on-hero  .lt.v3 .lt-trigger       { color: var(--white); border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.08); }
    .on-hero  .lt.v3 .lt-trigger:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.5); }
    .on-white .lt.v3 .lt-trigger       { color: var(--gd); border-color: var(--g3); background: transparent; }
    .on-white .lt.v3 .lt-trigger:hover { border-color: var(--sangria); color: var(--sangria); background: rgba(84,23,54,.03); }

    .lt.v3 .lt-flag     { font-size: 17px; line-height: 1; }
    .lt.v3 .lt-fullname { font-size: 13px; font-weight: 500; white-space: nowrap; }

    .lt.v3 .lt-panel {
      min-width: 210px; border-radius: 10px;
      box-shadow: var(--sh-md), 0 0 0 1px rgba(0,0,0,.05); padding: 5px;
    }
    .lt.v3 .lt-option {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 12px; border-radius: 7px; border: none; background: none;
      font-family: var(--fs); color: var(--gd); cursor: pointer; text-align: left;
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
    }
    .lt.v3 .lt-option:hover  { background: var(--gl); }
    .lt.v3 .lt-option.active { background: rgba(84,23,54,.06); color: var(--sangria); }
    .lt.v3 .lt-opt-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
    .lt.v3 .lt-opt-code { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; min-width: 24px; }
    .lt.v3 .lt-option.active .lt-opt-code { color: var(--sangria); }
    .lt.v3 .lt-opt-name { flex: 1; font-size: 12px; color: var(--gm); }
    .lt.v3 .lt-option.active .lt-opt-name { color: rgba(84,23,54,.5); }
  </style>
</head>
<body>

<div class="page">

  <!-- ── ON HERO (transparent nav) ───────────────────── -->
  <div class="row-label">Over hero image — transparent nav</div>

  <!-- V1 hero -->
  <div class="nav-strip on-hero">
    <span class="nav-logo">viatu</span>
    <div class="nav-right">
      <span class="v-badge">V1 · Outlined Pill</span>
      <div class="lt v1" id="v1-hero">
        <button class="lt-trigger" onclick="toggle('v1-hero')">
          <span class="lt-flag">🇬🇧</span>
          <span class="lt-sep"></span>
          <span class="lt-code" id="v1h-code">EN</span>
          <svg class="lt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lt-panel">
          <button class="lt-option active" onclick="pick('v1-hero','v1h-code','EN','🇬🇧',this)"><span class="lt-opt-flag">🇬🇧</span><span class="lt-opt-code">EN</span><span class="lt-opt-name">English</span><svg class="lt-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lt-option" onclick="pick('v1-hero','v1h-code','DE','🇩🇪',this)"><span class="lt-opt-flag">🇩🇪</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">Deutsch</span></button>
          <button class="lt-option" onclick="pick('v1-hero','v1h-code','FR','🇫🇷',this)"><span class="lt-opt-flag">🇫🇷</span><span class="lt-opt-code">FR</span><span class="lt-opt-name">Français</span></button>
          <button class="lt-option" onclick="pick('v1-hero','v1h-code','ES','🇪🇸',this)"><span class="lt-opt-flag">🇪🇸</span><span class="lt-opt-code">ES</span><span class="lt-opt-name">Español</span></button>
        </div>
      </div>
      <button class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to homepage
      </button>
    </div>
  </div>

  <!-- V2 hero -->
  <div class="nav-strip on-hero">
    <span class="nav-logo">viatu</span>
    <div class="nav-right">
      <span class="v-badge">V2 · Globe Accent</span>
      <div class="lt v2" id="v2-hero">
        <button class="lt-trigger" onclick="toggle('v2-hero')">
          <svg class="lt-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="1.75"/><line x1="2" y1="12" x2="22" y2="12" stroke-width="1.5"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke-width="1.5"/></svg>
          <span class="lt-code" id="v2h-code">EN</span>
          <svg class="lt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lt-panel">
          <div class="lt-panel-header"><span class="lt-panel-label">Language</span></div>
          <button class="lt-option active" onclick="pick('v2-hero','v2h-code','EN','🇬🇧',this)"><span class="lt-opt-flag">🇬🇧</span><span class="lt-opt-code">EN</span><span class="lt-opt-name">English</span><svg class="lt-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lt-option" onclick="pick('v2-hero','v2h-code','DE','🇩🇪',this)"><span class="lt-opt-flag">🇩🇪</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">Deutsch</span></button>
          <button class="lt-option" onclick="pick('v2-hero','v2h-code','FR','🇫🇷',this)"><span class="lt-opt-flag">🇫🇷</span><span class="lt-opt-code">FR</span><span class="lt-opt-name">Français</span></button>
          <button class="lt-option" onclick="pick('v2-hero','v2h-code','ES','🇪🇸',this)"><span class="lt-opt-flag">🇪🇸</span><span class="lt-opt-code">ES</span><span class="lt-opt-name">Español</span></button>
        </div>
      </div>
      <button class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to homepage
      </button>
    </div>
  </div>

  <!-- V3 hero -->
  <div class="nav-strip on-hero">
    <span class="nav-logo">viatu</span>
    <div class="nav-right">
      <span class="v-badge">V3 · Flag Forward</span>
      <div class="lt v3" id="v3-hero">
        <button class="lt-trigger" onclick="toggle('v3-hero')">
          <span class="lt-flag">🇬🇧</span>
          <span class="lt-fullname" id="v3h-name">English</span>
          <svg class="lt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lt-panel">
          <button class="lt-option active" onclick="pick('v3-hero','v3h-name','EN','🇬🇧',this,'English')"><span class="lt-opt-flag">🇬🇧</span><span class="lt-opt-code">EN</span><span class="lt-opt-name">English</span><svg class="lt-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lt-option" onclick="pick('v3-hero','v3h-name','DE','🇩🇪',this,'Deutsch')"><span class="lt-opt-flag">🇩🇪</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">Deutsch</span></button>
          <button class="lt-option" onclick="pick('v3-hero','v3h-name','FR','🇫🇷',this,'Français')"><span class="lt-opt-flag">🇫🇷</span><span class="lt-opt-code">FR</span><span class="lt-opt-name">Français</span></button>
          <button class="lt-option" onclick="pick('v3-hero','v3h-name','ES','🇪🇸',this,'Español')"><span class="lt-opt-flag">🇪🇸</span><span class="lt-opt-code">ES</span><span class="lt-opt-name">Español</span></button>
        </div>
      </div>
      <button class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to homepage
      </button>
    </div>
  </div>

  <!-- ── ON WHITE (scrolled nav) ─────────────────────── -->
  <div class="row-label" style="padding-top:48px;">Scrolled — white nav</div>

  <!-- V1 white -->
  <div class="nav-strip on-white">
    <span class="nav-logo">viatu</span>
    <div class="nav-right">
      <span class="v-badge">V1 · Outlined Pill</span>
      <div class="lt v1" id="v1-white">
        <button class="lt-trigger" onclick="toggle('v1-white')">
          <span class="lt-flag">🇬🇧</span>
          <span class="lt-sep"></span>
          <span class="lt-code" id="v1w-code">EN</span>
          <svg class="lt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lt-panel">
          <button class="lt-option active" onclick="pick('v1-white','v1w-code','EN','🇬🇧',this)"><span class="lt-opt-flag">🇬🇧</span><span class="lt-opt-code">EN</span><span class="lt-opt-name">English</span><svg class="lt-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lt-option" onclick="pick('v1-white','v1w-code','DE','🇩🇪',this)"><span class="lt-opt-flag">🇩🇪</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">Deutsch</span></button>
          <button class="lt-option" onclick="pick('v1-white','v1w-code','FR','🇫🇷',this)"><span class="lt-opt-flag">🇫🇷</span><span class="lt-opt-code">FR</span><span class="lt-opt-name">Français</span></button>
          <button class="lt-option" onclick="pick('v1-white','v1w-code','ES','🇪🇸',this)"><span class="lt-opt-flag">🇪🇸</span><span class="lt-opt-code">ES</span><span class="lt-opt-name">Español</span></button>
        </div>
      </div>
      <button class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to homepage
      </button>
    </div>
  </div>

  <!-- V2 white -->
  <div class="nav-strip on-white">
    <span class="nav-logo">viatu</span>
    <div class="nav-right">
      <span class="v-badge">V2 · Globe Accent</span>
      <div class="lt v2" id="v2-white">
        <button class="lt-trigger" onclick="toggle('v2-white')">
          <svg class="lt-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="1.75"/><line x1="2" y1="12" x2="22" y2="12" stroke-width="1.5"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke-width="1.5"/></svg>
          <span class="lt-code" id="v2w-code">EN</span>
          <svg class="lt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lt-panel">
          <div class="lt-panel-header"><span class="lt-panel-label">Language</span></div>
          <button class="lt-option active" onclick="pick('v2-white','v2w-code','EN','🇬🇧',this)"><span class="lt-opt-flag">🇬🇧</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">English</span><svg class="lt-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lt-option" onclick="pick('v2-white','v2w-code','DE','🇩🇪',this)"><span class="lt-opt-flag">🇩🇪</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">Deutsch</span></button>
          <button class="lt-option" onclick="pick('v2-white','v2w-code','FR','🇫🇷',this)"><span class="lt-opt-flag">🇫🇷</span><span class="lt-opt-code">FR</span><span class="lt-opt-name">Français</span></button>
          <button class="lt-option" onclick="pick('v2-white','v2w-code','ES','🇪🇸',this)"><span class="lt-opt-flag">🇪🇸</span><span class="lt-opt-code">ES</span><span class="lt-opt-name">Español</span></button>
        </div>
      </div>
      <button class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to homepage
      </button>
    </div>
  </div>

  <!-- V3 white -->
  <div class="nav-strip on-white" style="margin-bottom: 60px;">
    <span class="nav-logo">viatu</span>
    <div class="nav-right">
      <span class="v-badge">V3 · Flag Forward</span>
      <div class="lt v3" id="v3-white">
        <button class="lt-trigger" onclick="toggle('v3-white')">
          <span class="lt-flag">🇬🇧</span>
          <span class="lt-fullname" id="v3w-name">English</span>
          <svg class="lt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="lt-panel">
          <button class="lt-option active" onclick="pick('v3-white','v3w-name','EN','🇬🇧',this,'English')"><span class="lt-opt-flag">🇬🇧</span><span class="lt-opt-code">EN</span><span class="lt-opt-name">English</span><svg class="lt-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
          <button class="lt-option" onclick="pick('v3-white','v3w-name','DE','🇩🇪',this,'Deutsch')"><span class="lt-opt-flag">🇩🇪</span><span class="lt-opt-code">DE</span><span class="lt-opt-name">Deutsch</span></button>
          <button class="lt-option" onclick="pick('v3-white','v3w-name','FR','🇫🇷',this,'Français')"><span class="lt-opt-flag">🇫🇷</span><span class="lt-opt-code">FR</span><span class="lt-opt-name">Français</span></button>
          <button class="lt-option" onclick="pick('v3-white','v3w-name','ES','🇪🇸',this,'Español')"><span class="lt-opt-flag">🇪🇸</span><span class="lt-opt-code">ES</span><span class="lt-opt-name">Español</span></button>
        </div>
      </div>
      <button class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to homepage
      </button>
    </div>
  </div>

</div>

<script>
  function toggle(id) {
    const el = document.getElementById(id)
    const isOpen = el.classList.contains('open')
    // Close all
    document.querySelectorAll('.lt.open').forEach(e => e.classList.remove('open'))
    if (!isOpen) el.classList.add('open')
  }

  function pick(toggleId, codeElId, code, flag, optionEl, fullName) {
    // Update trigger display
    const toggleEl = document.getElementById(toggleId)
    const codeEl   = document.getElementById(codeElId)
    if (codeEl) codeEl.textContent = code

    // V3: update flag + name in trigger
    const flagEl = toggleEl.querySelector('.lt-trigger .lt-flag')
    if (flagEl) flagEl.textContent = flag
    const nameEl = toggleEl.querySelector('.lt-trigger .lt-fullname')
    if (nameEl && fullName) nameEl.textContent = fullName

    // Update active state + check marks
    const panel = toggleEl.querySelector('.lt-panel')
    panel.querySelectorAll('.lt-option').forEach(opt => {
      opt.classList.remove('active')
      const existingCheck = opt.querySelector('.lt-check')
      if (existingCheck) existingCheck.remove()
    })
    optionEl.classList.add('active')
    const check = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
    check.setAttribute('class', 'lt-check')
    check.setAttribute('viewBox', '0 0 24 24')
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline')
    poly.setAttribute('points', '20 6 9 17 4 12')
    check.appendChild(poly)
    optionEl.appendChild(check)

    // Close
    toggleEl.classList.remove('open')
  }

  // Close on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.lt')) {
      document.querySelectorAll('.lt.open').forEach(el => el.classList.remove('open'))
    }
  })

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.lt.open').forEach(el => el.classList.remove('open'))
    }
  })
</script>
</body>
</html>
