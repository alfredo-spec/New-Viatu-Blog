<rect y="0" width="30" height="2.86" fill="#319208"/>
<rect y="2.86" width="30" height="2.86" fill="#FFD200"/>
<rect y="5.72" width="30" height="2.86" fill="#DE2010"/>
<rect y="8.58" width="30" height="2.86" fill="#FFFFFF"/>
<rect y="11.44" width="30" height="2.86" fill="#DE2010"/>
<rect y="14.3" width="30" height="2.86" fill="#FFD200"/>
<rect y="17.16" width="30" height="2.84" fill="#319208"/>
