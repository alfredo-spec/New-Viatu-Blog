<svg width="30" height="20" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg">
<!-- Blue top-right -->
<rect width="30" height="20" fill="#003580"/>
<!-- Green bottom-left triangle -->
<polygon points="0,0 0,20 30,20" fill="#009543"/>
<!-- White diagonal stripe border -->
<polygon points="0,0 0,5 25,20 30,20 30,15 5,0" fill="#FFFFFF"/>
<!-- Red diagonal stripe -->
<polygon points="0,1.5 0,3.5 27,20 29,20 30,18 30,16 3,0 1,0" fill="#C8102E"/>
<!-- Sun (yellow circle with rays) in top-left blue area -->
<circle cx="7.5" cy="6.5" r="3" fill="#FFD100"/>
<!-- Blue inner circle to create crescent-like sun -->
<circle cx="8.3" cy="5.8" r="2.5" fill="#003580"/>
<rect x="0" y="0" width="30" height="20" stroke="#D0D0D0" stroke-width="0.5" fill="none"/>
</svg>
