<svg width="30" height="20" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg">
<!-- Red top half -->
<rect y="0" width="30" height="10" fill="#DE3831"/>
<!-- Blue bottom half -->
<rect y="10" width="30" height="10" fill="#002395"/>
<!-- White border stripes -->
<rect y="8.5" width="30" height="1" fill="#FFFFFF"/>
<rect y="10.5" width="30" height="1" fill="#FFFFFF"/>
<!-- Green Y-band -->
<polygon points="0,0 14,0 14,8.5 10.5,10 14,11.5 14,20 0,20" fill="#007749"/>
<!-- Gold Y-border -->
<path d="M0,1 L0,2.5 L8,10 L0,17.5 L0,19 L9.5,10 Z" fill="#FFB81C"/>
<!-- Black triangle -->
<polygon points="0,2.5 0,17.5 8,10" fill="#000000"/>
<rect x="0" y="0" width="30" height="20" stroke="#D0D0D0" stroke-width="0.5" fill="none"/>
</svg>
